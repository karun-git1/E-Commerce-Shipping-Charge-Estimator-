spring:
  datasource:
    url: jdbc:h2:mem:jumbotaildb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  cache:
    type: caffeine

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

caffeine:
  cache:
    spec: maximumSize=1000,expireAfterWrite=10m
