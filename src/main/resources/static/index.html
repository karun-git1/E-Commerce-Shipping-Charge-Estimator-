<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumbotail Shipping Estimator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-header h3 {
            color: #333;
        }

        .total-charge {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .detail-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
        }

        .detail-item label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .links a:hover {
            opacity: 1;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚚 Jumbotail Shipping Estimator</h1>
            <p>Calculate shipping charges with real-time distance and volumetric weight</p>
        </header>

        <div class="card">
            <h2>Calculate Shipping</h2>
            <form id="shippingForm">
                <div class="form-group">
                    <label for="customerId">Customer</label>
                    <select id="customerId" required>
                        <option value="">Select Customer</option>
                        <option value="1">Rajesh Kumar - MG Road, Bangalore</option>
                        <option value="2">Priya Sharma - JP Nagar, Bangalore</option>
                        <option value="3">Amit Patel - Koramangala, Bangalore</option>
                        <option value="4">Sneha Gupta - Whitefield, Bangalore</option>
                        <option value="5">Vikram Reddy - Indiranagar, Bangalore</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="productId">Product</label>
                    <select id="productId" required>
                        <option value="">Select Product</option>
                        <option value="1">Rice Bag 25kg</option>
                        <option value="2">Wheat Flour 10kg</option>
                        <option value="3">Cooking Oil 5L</option>
                        <option value="4">Sugar 5kg</option>
                        <option value="5">Tea Powder 1kg</option>
                        <option value="6">Coffee Powder 500g</option>
                        <option value="7">Spices Box</option>
                        <option value="8">Pulses 5kg</option>
                        <option value="9">Detergent 2kg</option>
                        <option value="10">Soap Pack</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="deliverySpeed">Delivery Speed</label>
                    <select id="deliverySpeed" required>
                        <option value="STANDARD">Standard (3-7 days)</option>
                        <option value="EXPRESS">Express (1-3 days)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="transportMode">Transport Mode</label>
                    <select id="transportMode" required>
                        <option value="ROAD">Road Transport</option>
                        <option value="RAIL">Rail Transport</option>
                        <option value="AIR">Air Transport</option>
                    </select>
                </div>

                <button type="submit" class="btn">
                    Calculate Shipping
                </button>
            </form>

            <div id="error" class="error"></div>

            <div id="result" class="result">
                <div class="result-header">
                    <h3>Shipping Estimate</h3>
                    <div class="total-charge" id="totalCharge"></div>
                </div>
                <div class="details-grid" id="detailsGrid"></div>
            </div>
        </div>

        <div class="links">
            <a href="/swagger-ui.html" target="_blank">📚 API Documentation (Swagger)</a>
            <a href="/h2-console" target="_blank">🗄️ H2 Database Console</a>
        </div>
    </div>

    <script>
        document.getElementById('shippingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Calculating<span class="loading"></span>';
            btn.disabled = true;
            
            document.getElementById('error').classList.remove('show');
            document.getElementById('result').classList.remove('show');

            const request = {
                customerId: parseInt(document.getElementById('customerId').value),
                productId: parseInt(document.getElementById('productId').value),
                deliverySpeed: document.getElementById('deliverySpeed').value,
                transportMode: document.getElementById('transportMode').value
            };

            try {
                const response = await fetch('/api/shipping/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Failed to calculate shipping');
                }

                displayResult(data.data);
            } catch (err) {
                document.getElementById('error').textContent = err.message;
                document.getElementById('error').classList.add('show');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        function displayResult(data) {
            document.getElementById('totalCharge').textContent = '₹' + data.totalCharge.toFixed(2);
            
            const details = [
                { label: 'Customer', value: data.customerName },
                { label: 'Product', value: data.productName },
                { label: 'Warehouse', value: data.warehouseName },
                { label: 'Distance', value: data.distanceKm + ' km' },
                { label: 'Actual Weight', value: data.actualWeight + ' kg' },
                { label: 'Volumetric Weight', value: data.volumetricWeight + ' kg' },
                { label: 'Chargeable Weight', value: data.chargeableWeight + ' kg' },
                { label: 'Delivery Speed', value: data.deliverySpeed },
                { label: 'Transport Mode', value: data.transportMode },
                { label: 'Base Charge', value: '₹' + data.baseCharge.toFixed(2) },
                { label: 'Express Surcharge', value: '₹' + data.expressSurcharge.toFixed(2) },
                { label: 'Estimated Delivery', value: data.estimatedDeliveryTime }
            ];

            document.getElementById('detailsGrid').innerHTML = details.map(d => `
                <div class="detail-item">
                    <label>${d.label}</label>
                    <div class="value">${d.value}</div>
                </div>
            `).join('');

            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
